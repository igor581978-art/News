<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body onclick="run()">
    <script>
        const urls = [
            'https://www.youtube.com/@d.yelisevych/videos',
            'https://www.youtube.com/@Taras_Lawyer/videos',
            'https://www.youtube.com/@DubinizmTV',
            'https://www.youtube.com/@%D0%86%D0%B3%D0%BE%D1%80%D0%9C%D0%BE%D1%81%D1%96%D0%B9%D1%87%D1%83%D0%BA1/videos',
            'https://www.youtube.com/@LISOVSKIY_NEWS/videos',
            'https://www.youtube.com/@%D0%90%D0%BB%D0%B5%D0%BA%D1%81%D0%B0%D0%BD%D0%B4%D1%80%D0%9B%D0%B0%D0%B7%D0%B0%D1%80%D0%B5%D0%B2-%D0%B33%D1%8A/videos',
            'https://www.youtube.com/@shelestSHUM/videos',
            'https://www.youtube.com/@DNK_kutepov/videos',
            'https://www.youtube.com/@Huraanton/videos'
        ];

        function run() {
            urls.forEach((url, i) => {
                setTimeout(() => { window.open(url, '_blank'); }, i * 250);
            });
            // Пытаемся закрыться. Если не даст — страница останется пустой и белой.
            setTimeout(() => { window.close(); }, urls.length * 250 + 500);
        }

        // Запуск при загрузке
        window.onload = run;
    </script>
</body>
</html>
